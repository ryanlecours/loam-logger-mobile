query BikeHistory($bikeId: ID!, $startDate: String, $endDate: String) {
  bikeHistory(bikeId: $bikeId, startDate: $startDate, endDate: $endDate) {
    bike {
      id
      nickname
      manufacturer
      model
      year
    }
    rides {
      id
      startTime
      durationSeconds
      distanceMeters
      elevationGainMeters
      averageHr
      rideType
      trailSystem
      location
    }
    serviceEvents {
      id
      performedAt
      notes
      hoursAtService
      component {
        id
        type
        location
        brand
        model
      }
    }
    installs {
      id
      eventType
      occurredAt
      component {
        id
        type
        location
        brand
        model
      }
    }
    totals {
      rideCount
      totalDistanceMeters
      totalDurationSeconds
      totalElevationGainMeters
      serviceEventCount
      installEventCount
    }
    truncated
  }
}
