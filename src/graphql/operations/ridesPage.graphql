query RidesPage($take: Int, $after: ID, $filter: RidesFilterInput) {
  rides(take: $take, after: $after, filter: $filter) {
    id
    startTime
    durationSeconds
    distanceMeters
    elevationGainMeters
    averageHr
    rideType
    bikeId
    location
    notes
    garminActivityId
    stravaActivityId
    whoopWorkoutId
    weather {
      id
      tempC
      feelsLikeC
      precipitationMm
      windSpeedKph
      humidity
      wmoCode
      condition
    }
  }
}
