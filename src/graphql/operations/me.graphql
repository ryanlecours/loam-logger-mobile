query Me {
  me {
    id
    email
    name
    avatarUrl
    onboardingCompleted
    hasAcceptedCurrentTerms
    location
    age
    role
    mustChangePassword
    isFoundingRider
    hoursDisplayPreference
    predictionMode
    distanceUnit
    notifyOnRideUpload
    pairedComponentMigrationSeenAt
    createdAt
    activeDataSource
    subscriptionTier
    subscriptionProvider
    referralCode
    needsDowngradeSelection
    tierLimits {
      maxBikes
      allowedComponentTypes
      currentBikeCount
      canAddBike
    }
    accounts {
      provider
      connectedAt
    }
  }
}
