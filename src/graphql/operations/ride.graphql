query Ride($id: ID!) {
  ride(id: $id) {
    id
    startTime
    durationSeconds
    distanceMeters
    elevationGainMeters
    averageHr
    rideType
    bikeId
    location
    notes
    garminActivityId
    stravaActivityId
    whoopWorkoutId
    suuntoWorkoutId
    weather {
      id
      tempC
      feelsLikeC
      precipitationMm
      windSpeedKph
      humidity
      wmoCode
      condition
    }
  }
}
