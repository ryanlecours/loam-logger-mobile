fragment ComponentFields on Component {
  id
  type
  brand
  model
  notes
  isStock
  bikeId
  hoursUsed
  serviceDueAtHours
  baselineWearPercent
  baselineMethod
  baselineConfidence
  baselineSetAt
  lastServicedAt
  location
  status
  serviceLogs {
    id
    performedAt
    notes
    hoursAtService
  }
}

fragment PredictionFields on BikePredictionSummary {
  bikeId
  bikeName
  overallStatus
  dueNowCount
  dueSoonCount
  generatedAt
  priorityComponent {
    componentId
    componentType
    location
    brand
    model
    status
    hoursRemaining
    ridesRemainingEstimate
    confidence
    currentHours
    serviceIntervalHours
    hoursSinceService
  }
  components {
    componentId
    componentType
    location
    brand
    model
    status
    hoursRemaining
    ridesRemainingEstimate
    confidence
    currentHours
    serviceIntervalHours
    hoursSinceService
  }
}

fragment BikeFieldsLight on Bike {
  id
  nickname
  manufacturer
  model
  year
  travelForkMm
  travelShockMm
  notes
  spokesId
  spokesUrl
  thumbnailUrl
  family
  category
  subcategory
  buildKind
  isFrameset
  isEbike
  gender
  frameMaterial
  hangerStandard
  motorMaker
  motorModel
  motorPowerW
  motorTorqueNm
  batteryWh
  acquisitionCondition
  status
  retiredAt
  components {
    ...ComponentFields
  }
  createdAt
  updatedAt
}

fragment BikeNotificationPreferenceFields on BikeNotificationPreference {
  bikeId
  serviceNotificationsEnabled
  serviceNotificationMode
  serviceNotificationThreshold
}

fragment BikeFields on Bike {
  id
  nickname
  manufacturer
  model
  year
  travelForkMm
  travelShockMm
  notes
  spokesId
  spokesUrl
  thumbnailUrl
  family
  category
  subcategory
  buildKind
  isFrameset
  isEbike
  gender
  frameMaterial
  hangerStandard
  motorMaker
  motorModel
  motorPowerW
  motorTorqueNm
  batteryWh
  acquisitionCondition
  status
  retiredAt
  components {
    ...ComponentFields
  }
  predictions {
    ...PredictionFields
  }
  notificationPreference {
    ...BikeNotificationPreferenceFields
  }
  createdAt
  updatedAt
}

query GearLight {
  bikes {
    ...BikeFieldsLight
  }
  allBikes: bikes(includeInactive: true) {
    ...BikeFieldsLight
  }
  spareComponents: components(filter: { onlySpare: true }) {
    ...ComponentFields
  }
}

query Gear {
  bikes(includeInactive: true) {
    ...BikeFields
  }
  spareComponents: components(filter: { onlySpare: true }) {
    ...ComponentFields
  }
}

mutation AddBike($input: AddBikeInput!) {
  addBike(input: $input) {
    ...BikeFields
  }
}

mutation UpdateBike($id: ID!, $input: UpdateBikeInput!) {
  updateBike(id: $id, input: $input) {
    ...BikeFields
  }
}

mutation DeleteBike($id: ID!) {
  deleteBike(id: $id) {
    ok
    id
  }
}

mutation RetireBike($id: ID!, $status: BikeStatus!) {
  retireBike(id: $id, status: $status) {
    ...BikeFields
  }
}

mutation ReactivateBike($id: ID!) {
  reactivateBike(id: $id) {
    ...BikeFields
  }
}

mutation UpdateComponent($id: ID!, $input: UpdateComponentInput!) {
  updateComponent(id: $id, input: $input) {
    ...ComponentFields
  }
}

mutation LogComponentService($id: ID!, $performedAt: String) {
  logComponentService(id: $id, performedAt: $performedAt) {
    ...ComponentFields
  }
}

mutation InstallComponent($input: InstallComponentInput!) {
  installComponent(input: $input) {
    installedComponent {
      ...ComponentFields
    }
    displacedComponent {
      ...ComponentFields
    }
  }
}

mutation SnoozeComponent($id: ID!, $hours: Float) {
  snoozeComponent(id: $id, hours: $hours) {
    id
    serviceDueAtHours
  }
}

mutation UpdateBikeNotificationPreference($input: UpdateBikeNotificationPreferenceInput!) {
  updateBikeNotificationPreference(input: $input) {
    ...BikeNotificationPreferenceFields
  }
}
