name: EAS Build

# Mobile releases are triggered MANUALLY only. We intentionally do NOT build on
# push to main: every production build is a paid EAS build + TestFlight submission,
# and auto-building each merge burned through too many. Cut a release on demand
# from the Actions tab → "EAS Build" → "Run workflow".
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'production'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Platform to build'
        required: false
        default: 'ios'
        type: choice
        options:
          - ios

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build
        env:
          # SENTRY_AUTH_TOKEN enables the @sentry/react-native/expo plugin
          # to upload debug symbols. EXPO_PUBLIC_SENTRY_RELEASE tags the
          # runtime Sentry.init with the same SHA so crash reports bind to
          # the uploaded symbols. Uses the full commit SHA to match Railway's
          # and the web's release format, keeping all three projects aligned.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          EXPO_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
        run: |
          # Only production builds auto-submit to TestFlight. Preview builds use
          # internal distribution and have no submit profile in eas.json, so
          # submitting them would fail.
          SUBMIT_FLAG=""
          if [ "${{ inputs.profile }}" = "production" ]; then
            SUBMIT_FLAG="--auto-submit"
          fi
          eas build \
            --profile ${{ inputs.profile }} \
            --platform ${{ inputs.platform }} \
            $SUBMIT_FLAG \
            --non-interactive \
            --no-wait
