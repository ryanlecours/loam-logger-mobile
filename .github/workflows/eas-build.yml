name: EAS Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'app/**'
      - 'assets/**'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'production'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Platform to build'
        required: false
        default: 'ios'
        type: choice
        options:
          - ios

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.profile }}" >> $GITHUB_OUTPUT
            echo "platform=${{ inputs.platform }}" >> $GITHUB_OUTPUT
          else
            # Default for push-to-main: build production iOS and auto-submit to
            # TestFlight. Every merge to main becomes a release candidate, so
            # only land changes on main when you're ready to ship them.
            echo "profile=production" >> $GITHUB_OUTPUT
            echo "platform=ios" >> $GITHUB_OUTPUT
          fi

      - name: Run EAS Build
        env:
          # SENTRY_AUTH_TOKEN enables the @sentry/react-native/expo plugin
          # to upload debug symbols. EXPO_PUBLIC_SENTRY_RELEASE tags the
          # runtime Sentry.init with the same SHA so crash reports bind to
          # the uploaded symbols. Uses the full commit SHA to match Railway's
          # and the web's release format, keeping all three projects aligned.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          EXPO_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
        run: |
          eas build \
            --profile ${{ steps.params.outputs.profile }} \
            --platform ${{ steps.params.outputs.platform }} \
            --auto-submit \
            --non-interactive \
            --no-wait
