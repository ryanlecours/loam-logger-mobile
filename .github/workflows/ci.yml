name: LoamLogger Mobile CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  issue_comment:
    types: [created]

jobs:
  ci:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Verify GraphQL generated files are committed
        run: |
          if [ ! -f "src/graphql/generated.ts" ]; then
            echo "⚠️  GraphQL generated file not found at src/graphql/generated.ts — skipping check"
          else
            echo "✅ GraphQL generated files are present"
          fi

      - name: Expo export (web build validation)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: https://placeholder.test

  # Claude PR Review - triggered by @claude review comment
  claude-pr-review:
    name: Claude PR Review (Haiku, manual on @claude review)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude review') &&
      github.event.comment.user.type != 'Bot'

    steps:
      - name: Get PR base branch
        id: pr-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const isMain = pr.base.ref === 'main';
            core.info(`Base branch: ${pr.base.ref}`);
            core.setOutput('run_claude', isMain ? 'true' : 'false');

      - name: Claude PR review (Haiku, main branch only)
        if: steps.pr-info.outputs.run_claude == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-3-5-haiku-20241022
            --max-turns 6
